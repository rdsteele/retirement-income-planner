name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Add project to path
        run: echo "PYTHONPATH=$PYTHONPATH:${{ github.workspace }}" >> $GITHUB_ENV

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy services/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=services --cov=api --cov-report=term-missing --cov-fail-under=90 -v 2>&1 | tail -20

      - name: Security scan with bandit
        run: bandit -r services/ api/ -ll

      - name: Audit dependencies
        run: pip-audit

      - name: Dead code check (warning only)
        run: vulture services/ api/ vulture_whitelist.py --min-confidence 80
        continue-on-error: true